<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Fairy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        /* ----- PERMANENT FAIRY GLITTER THEME ----- */
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(120deg, #fccb90 0%, #d57eeb 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            text-align: center;
            color: #555;
            position: relative;
            z-index: 1;
        }
        
        /* CSS Glitter/Sparkle Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.3) 2px, transparent 4px),
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 4px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: glitter 3s linear infinite alternate;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes glitter {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            padding: 30px 20px 100px 20px;
            box-sizing: border-box;
        }

        h1, h2 {
            color: #fff;
            text-shadow: 0 0 10px #ff758c, 0 0 20px #ff758c;
            margin-bottom: 5px;
        }

        p.subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Glowing Glass Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8), inset 0 0 15px rgba(255, 255, 255, 0.6);
        }

        /* Passcode Screen */
        #login-screen { display: block; margin-top: 20vh; }
        #login-screen input {
            width: 60%; padding: 15px; font-size: 20px; text-align: center;
            border: 2px solid #fff; border-radius: 15px; margin-bottom: 20px;
            outline: none; letter-spacing: 5px; color: #555; background: rgba(255,255,255,0.8);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        #login-screen button {
            background: #fff; color: #ffb7b2; border: none; padding: 15px 30px;
            border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer;
            width: 60%; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #error-msg { color: #ff4d4d; font-size: 13px; margin-top: 10px; display: none; font-weight: bold; }

        /* Main App */
        #main-app { display: none; animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Clocks */
        .clock-container { display: flex; justify-content: space-around; font-weight: bold; }
        .clock { display: flex; flex-direction: column; }
        .clock-time { font-size: 20px; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.15); }
        .clock-label { font-size: 12px; color: rgba(255,255,255,0.9); text-transform: uppercase; }

        /* Timer Display */
        #official-timer-container { 
            display: none; 
            margin-top: 15px; 
            font-weight: bold; 
            color: #ff758c; 
            background: #fff; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            border: 2px solid #ffb7b2;
        }

        /* Open When Buttons */
        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .grid button {
            background: rgba(255, 255, 255, 0.8); border: none; border-radius: 15px;
            padding: 15px; font-size: 15px; color: #ff758c; font-weight: 600;
            cursor: pointer; transition: 0.2s; text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .grid button:active { transform: scale(0.97); background: #fff; }

        /* Photo & Video Gallery */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .polaroid {
            background: #fff; padding: 8px 8px 25px 8px; border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); transform: rotate(-2deg);
            cursor: pointer; transition: transform 0.2s;
        }
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:active { transform: scale(0.95); }
        .polaroid img, .polaroid video { 
            width: 100%; height: 120px; object-fit: cover; border-radius: 3px; background: #ddd; pointer-events: none; 
        }

        /* Lightbox for Enlarger */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 2000;
            justify-content: center; align-items: center; flex-direction: column;
        }
        #lightbox-content { max-width: 90%; max-height: 80vh; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #lightbox-close { margin-top: 20px; background: #fff; color: #ff758c; border: none; padding: 10px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* Music Player */
        .music-player {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px); border-radius: 30px; padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 100; box-sizing: border-box;
            border: 1px solid #ffb7b2;
        }
        .song-info { font-size: 13px; font-weight: bold; color: #ff758c; display: flex; align-items: center; gap: 10px; }
        .play-btn { background: #ffb7b2; color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 16px; cursor: pointer; }

        /* Modals */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            justify-content: center; align-items: center; padding: 20px; z-index: 1000; box-sizing: border-box;
        }
        .modal-content {
            background: #fff; padding: 30px; border-radius: 20px; max-width: 350px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%;
        }
        .modal-text { font-size: 16px; line-height: 1.6; color: #444; margin-bottom: 25px; }
        .close-btn { background: #ffb7b2; border: none; padding: 12px 25px; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="Tahanan.mp3" type="audio/mpeg">
    </audio>

    <div class="app-container">
        
        <div id="login-screen">
            <h1>Hey Ms. Andrea <3</h1>
            <p class="subtitle">Enter your passcode</p>
            <input type="password" id="passcode" inputmode="numeric" maxlength="4" placeholder="••••">
            <br>
            <button onclick="checkPasscode()">Unlock</button>
            <div id="error-msg">Incorrect passcode. Try again.</div>
        </div>

        <div id="main-app">
            
            <div class="glass-panel clock-container">
                <div class="clock">
                    <span class="clock-label">Medan 🇮🇩</span>
                    <span class="clock-time" id="time-medan">--:--</span>
                </div>
                <div class="clock">
                    <span class="clock-label">Abu Dhabi 🇦🇪</span>
                    <span class="clock-time" id="time-abudhabi">--:--</span>
                </div>
            </div>

            <div id="official-timer-container">
                <div style="font-size: 14px; color:#888;">You have been officially mine for:</div>
                <div id="timer-display" style="font-size: 18px; margin-top: 5px;"></div>
            </div>

            <h1>Open When...</h1>
            <p class="subtitle">A quiet reminder, whenever you need it.</p>

            <div class="glass-panel grid" id="button-container">
                </div>

            <h2>You Miss Me?</h2>
            <div class="glass-panel gallery-grid">
                <div class="polaroid" onclick="openLightbox(this)">
                    <img src="1.jpg" alt="1">
                </div>
                
                <div class="polaroid" onclick="openLightbox(this)">
                    <video autoplay loop muted playsinline>
                        <source src="2.mp4" type="video/mp4">
                    </video>
                </div>

                <div class="polaroid" onclick="openLightbox(this)">
                    <img src="3.jpg" alt="3">
                </div>
                <div class="polaroid" onclick="openLightbox(this)">
                    <img src="4.jpg" alt="4">
                </div>
            </div>

        </div>
    </div>

    <div class="music-player" id="music-player" style="display: none;">
        <div class="song-info">
            <span>🎵</span>
            <span>Ako ang Tahanan mo</span>
        </div>
        <button class="play-btn" id="play-btn" onclick="toggleMusic()">▶</button>
    </div>

    <div id="lightbox">
        <div id="lightbox-media-container"></div>
        <button id="lightbox-close" onclick="closeLightbox()">Close</button>
    </div>

    <div id="msg-modal" class="modal">
        <div class="modal-content">
            <div id="msg-modal-text" class="modal-text"></div>
            <button class="close-btn" onclick="closeMsgModal()">Close</button>
        </div>
    </div>

    <script>
        const CORRECT_PASSCODE = "2527"; 
        let timerInterval;

        // --- THE EXACT DATE AND TIME SHE SAID YES ---
        // Format: Month Day, Year Hour:Minute:Second
        const officialAnniversary = new Date("April 26, 2026 21:50:00").getTime();

        // --- OPEN WHEN MESSAGES ---
        const messages = [
            { label: "You're doubting my love", text: "Every word I've said to you is true. You didn't force me to love you; loving you is the easiest thing I've ever done." },
            { label: "You feel alone", text: "Even when I'm not right next to you, you are not alone. My heart is always right beside you." },
            { label: "You're overthinking", text: "Like we promised each other, it's only you. I'm not entertaining anyone else, and I never will." },
            { label: "You need comfort", text: "Take a deep breath. We are okay. I am so glad you're officially mine. I love yoü." }
        ];

        // Init App
        function initApp() {
            // Setup Open When Buttons
            const container = document.getElementById('button-container');
            messages.forEach(msg => {
                let btn = document.createElement('button');
                btn.innerText = "♡ " + msg.label;
                btn.onclick = () => showMsgModal(msg.text);
                container.appendChild(btn);
            });

            // Start Clocks
            setInterval(updateClocks, 1000);
            updateClocks();

            // Start Official Timer immediately
            document.getElementById('official-timer-container').style.display = 'block';
            startTimer(officialAnniversary);
        }

        // Login
        function checkPasscode() {
            if (document.getElementById('passcode').value === CORRECT_PASSCODE) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('music-player').style.display = 'flex';
                
                const bgMusic = document.getElementById('bg-music');
                bgMusic.play().catch(e => console.log("Audio autoplay blocked"));
                document.getElementById('play-btn').innerText = "⏸";
                
                initApp();
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('passcode').value = '';
            }
        }

        // Clocks
        function updateClocks() {
            const opts = { hour: '2-digit', minute: '2-digit', hour12: true };
            document.getElementById('time-medan').innerText = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'Asia/Jakarta' }).format(new Date());
            document.getElementById('time-abudhabi').innerText = new Intl.DateTimeFormat('en-US', { ...opts, timeZone: 'Asia/Dubai' }).format(new Date());
        }

        // Music Toggle
        function toggleMusic() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('play-btn');
            if (audio.paused) { audio.play(); btn.innerText = "⏸"; } 
            else { audio.pause(); btn.innerText = "▶"; }
        }

        // Open When Modals
        function showMsgModal(text) {
            document.getElementById('msg-modal-text').innerText = text;
            document.getElementById('msg-modal').style.display = 'flex';
        }
        function closeMsgModal() { document.getElementById('msg-modal').style.display = 'none'; }
        
        // --- LIGHTBOX LOGIC ---
        function openLightbox(element) {
            const media = element.querySelector('img, video').cloneNode(true);
            media.id = "lightbox-content";
            
            if (media.tagName === 'VIDEO') {
                media.controls = true; 
                media.muted = false;   
            }

            const container = document.getElementById('lightbox-media-container');
            container.innerHTML = '';
            container.appendChild(media);
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.getElementById('lightbox-media-container').innerHTML = ''; 
        }

        // --- TIMER LOGIC ---
        function startTimer(startDate) {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = Date.now();
                const diff = now - startDate;

                // Ensure it doesn't break if someone's computer clock is a few seconds behind the server
                if (diff < 0) return; 

                let seconds = Math.floor((diff / 1000) % 60);
                let minutes = Math.floor((diff / 1000 / 60) % 60);
                let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                let days = Math.floor(diff / (1000 * 60 * 60 * 24));
                
                let years = Math.floor(days / 365);
                days %= 365;
                let months = Math.floor(days / 30);
                days %= 30;

                document.getElementById('timer-display').innerText = 
                    `${years}Y ${months}M ${days}D\n${hours}h ${minutes}m ${seconds}s`;
            }, 1000);
        }
    </script>

</body>
</html>
